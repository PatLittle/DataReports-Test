name: Fetch activity CSVs from Azure Blob

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

permissions:
  contents: write

jobs:
  fetch-csvs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install azure-storage-blob pandas

      - name: Download and filter CSVs
        env:
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
          CONTAINER_URL: ${{ secrets.CONTAINER_URL }}
          SAS_TOKEN: ${{ secrets.SAS_TOKEN }}
        run: python .github/scripts/download_activity_csvs.py

      - name: Commit updated CSVs and pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data pages/data-tables
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(data): refresh activity CSVs from Azure Blob"
          git push
